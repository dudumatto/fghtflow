services:
  postgres:
    image: postgres:16
    container_name: fightflow-pg
    environment:
      POSTGRES_DB: fightflow
      POSTGRES_USER: fightflow
      POSTGRES_PASSWORD: fightflow
    ports:
      - "5432:5432"
    volumes:
      - fightflow_pg_data:/var/lib/postgresql/data

volumes:
  fightflow_pg_data:
